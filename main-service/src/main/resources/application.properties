spring.application.name=ewm-main-service

server.port=8080
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:ewm-test;MODE=PostgreSQL
spring.datasource.username=ewm
spring.datasource.password=ewm

stat-service.url=http://localhost:9090
stat-client.timeout-ms=1000